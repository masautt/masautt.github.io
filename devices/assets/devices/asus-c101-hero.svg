<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="ASUS Chromebook Flip C101PA — placeholder">
  <!-- Placeholder hero for the ASUS Chromebook Flip C101PA. Transparent bg so the
       card's radial gradient shows through. Swap for a real photo/render:
       drop assets/devices/asus-c101-hero.png and point `hero:` at it. -->
  <g transform="translate(400,168)">
    <!-- convertible in tent / presentation mode (the way it's actually used) -->
    <rect x="-15" y="0" width="30" height="232" rx="8" transform="rotate(-33)" fill="#161b22" stroke="#22d3ee" stroke-width="2.5"/>
    <rect x="-9" y="14" width="18" height="150" rx="5" transform="rotate(-33)" fill="#22d3ee" opacity="0.15"/>
    <rect x="-15" y="0" width="30" height="232" rx="8" transform="rotate(33)" fill="#161b22" stroke="#22d3ee" stroke-width="2.5"/>
  </g>
  <!-- feet + floor -->
  <ellipse cx="272" cy="392" rx="26" ry="7" fill="#22d3ee" opacity="0.16"/>
  <ellipse cx="528" cy="392" rx="26" ry="7" fill="#22d3ee" opacity="0.16"/>
  <line x1="150" y1="392" x2="650" y2="392" stroke="#232a34" stroke-width="2"/>
  <!-- label -->
  <text x="400" y="446" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif"
        font-size="20" font-weight="700" letter-spacing="0.5" fill="#e6edf3">ASUS Chromebook Flip C101PA</text>
  <text x="400" y="474" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="13" letter-spacing="1.5" fill="#8b949e">HERO IMAGE PENDING</text>
</svg>
