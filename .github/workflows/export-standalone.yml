name: Export standalone HTML

# Builds the site with Jekyll, regenerates the self-contained
# devices/<slug>.standalone.html files, and commits them back.
# Triggers only on inputs that affect a device page — NOT on the standalone
# files themselves — so the auto-commit can't retrigger the workflow.
on:
  push:
    branches: [main]
    paths:
      - '_devices/**'
      - '_layouts/**'
      - '_includes/**'
      - 'assets/**'
      - '_config.yml'
      - 'export.sh'
      - '.github/workflows/export-standalone.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: export-standalone
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Jekyll
        run: gem install jekyll --no-document

      - name: Build site
        run: jekyll build            # outputs to _site/ (export.sh prefers this)

      - name: Export standalone HTML
        run: ./export.sh             # local _site/ build => fully in sync

      - name: Commit standalone files if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add devices/*.standalone.html || true
          if git diff --cached --quiet; then
            echo "No standalone changes to commit."
          else
            git commit -m "chore: auto-export standalone device HTML [skip ci]"
            git push
          fi
