name: Build & deploy Pages

# Builds the hub and deploys — one run, no second racing build (that used to cause
# spurious "Page build failed" emails).
#
# This repo no longer renders any section. Sections are built in their own masautt-inc
# repos and pushed here as static files (devices/, hotkeys/, dev/); a push from one of
# those deploy bots lands on main and triggers this build, which just publishes it.
# Standalone device HTML is exported by masautt-inc/devices now, so nothing is generated
# or committed back here.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write        # publish to GitHub Pages
  id-token: write     # OIDC token for actions/deploy-pages

concurrency:
  group: pages
  cancel-in-progress: true   # a newer push cancels an in-flight run (no error)

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Jekyll
        run: gem install jekyll --no-document

      - name: Build site
        run: jekyll build            # -> _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
