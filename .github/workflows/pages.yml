name: Build & deploy Pages

# Single deterministic pipeline: build the site, regenerate the standalone
# device HTML, commit those back, and deploy — all in one run. No second
# racing build (that used to cause spurious "Page build failed" emails).
on:
  push:
    branches: [main]
    paths-ignore:
      - 'devices/*.standalone.html'   # the bot's own commit must not retrigger
  workflow_dispatch:

permissions:
  contents: write     # commit refreshed standalone files back to the repo
  pages: write        # publish to GitHub Pages
  id-token: write     # OIDC token for actions/deploy-pages

concurrency:
  group: pages
  cancel-in-progress: true   # a newer push cancels an in-flight run (no error)

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Jekyll
        run: gem install jekyll --no-document

      - name: Build site
        run: jekyll build            # -> _site/

      - name: Export standalone HTML
        run: |
          ./export.sh                                   # writes devices/*.standalone.html
          cp devices/*.standalone.html _site/devices/   # include fresh copies in the artifact

      - name: Commit refreshed standalone files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add devices/*.standalone.html || true
          if git diff --cached --quiet; then
            echo "No standalone changes to commit."
          else
            git commit -m "chore: auto-export standalone device HTML [skip ci]"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
